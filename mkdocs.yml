site_name: iobox
site_description: Personal workspace context tool — email, calendar, and files across Gmail and Microsoft 365
site_url: https://timainge.github.io/iobox
repo_url: https://github.com/timainge/iobox

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_bases: false
            heading_level: 3

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Authentication: getting-started/authentication.md
    - Quick Start: getting-started/quickstart.md
  - Workspace:
    - Setup & Space Commands: workspace-guide.md
  - Providers:
    - Gmail: providers/gmail.md
    - Outlook: providers/outlook.md
    - Google Calendar: providers/google-calendar.md
    - Google Drive: providers/google-drive.md
  - CLI Reference:
    - search: cli/search.md
    - save: cli/save.md
    - send: cli/send.md
    - forward: cli/forward.md
    - auth-status: cli/auth-status.md
    - label: cli/label.md
    - trash: cli/trash.md
    - Drafts: cli/drafts.md
  - API Reference:
    - auth: api/auth.md
    - email_search: api/email_search.md
    - email_retrieval: api/email_retrieval.md
    - email_sender: api/email_sender.md
    - markdown_converter: api/markdown_converter.md
    - file_manager: api/file_manager.md
    - utils: api/utils.md
  - MCP Server: mcp.md
  - Integrations: integrations.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
